name: CI

on:

  push:

    branches:
      - main

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Build Backend
        run: |
          docker build -t backend ./backend

      - name: Build Frontend
        run: |
          docker build -t frontend ./frontend

      - name: Validate Compose
        run: |
          docker compose config