services:

  backend:

    build: ./backend

    container_name: backend

    depends_on:
      - db

  frontend:

    build: ./frontend

    container_name: frontend

  db:

    image: postgres:16

    container_name: postgres

    environment:

      POSTGRES_DB: demo

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: postgres

  nginx:

    image: nginx:latest

    container_name: nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - frontend
      - backend