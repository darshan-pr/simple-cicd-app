server {
    listen 80;
    server_name cicd.darshan-pr.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {

    listen 443 ssl http2;

    server_name cicd.darshan-pr.tech;

    ssl_certificate /etc/letsencrypt/live/cicd.darshan-pr.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cicd.darshan-pr.tech/privkey.pem;

    location / {
        proxy_pass http://frontend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://backend:8000/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}